<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Numbers</title>
  <script>
    window.NUMBERS_VERSION = "20260425a";
  </script>
</head>
<body>
  <div id="app"></div>

  <script>
    (function () {
      const v = window.NUMBERS_VERSION;

      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = `style.css?v=${v}`;
      document.head.appendChild(link);

      const vue = document.createElement("script");
      vue.src = "https://unpkg.com/vue@3/dist/vue.global.prod.js";
      vue.onload = function () {
        const app = document.createElement("script");
        app.src = `app.js?v=${v}`;
        document.body.appendChild(app);
      };
      document.body.appendChild(vue);
    })();
  </script>
</body>
</html>
